<!DOCTYPE html>
<html>
<head>
    <title>DynamoDB Demo</title>
</head>
<body>

<h2>Student Form</h2>

<form id="studentForm">
    <input type="text" id="name" placeholder="Name" required><br><br>
    <input type="text" id="roll_no" placeholder="Roll No" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="text" id="group_id" placeholder="Group ID" required><br><br>
    
    <button type="submit">Submit</button>
</form>

<p id="response"></p>

<script>
document.getElementById("studentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        roll_no: document.getElementById("roll_no").value,
        email: document.getElementById("email").value,
        group_id: document.getElementById("group_id").value
    };

    try {
        const res = await fetch("https://5w7yq4tjoa.execute-api.eu-north-1.amazonaws.com/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();
        document.getElementById("response").innerText = result.message || result.error;

    } catch (err) {
        document.getElementById("response").innerText = err;
    }
});
</script>

</body>
</html>
